<div class="skill-container" style="margin-bottom: 15px;">
    <div class="skill-info" style="display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 5px;">
        <span class="skill-name">{{ .Get "name" }}</span>
        <span class="skill-level">{{ .Get "level" }}/10</span>
    </div>
    <div class="skill-bar-bg" style="background: #e0e0e0; border-radius: 4px; width: 100%; height: 12px;">
        <div class="skill-bar-fill" 
             style="background: #3b82f6; 
                    height: 100%; 
                    border-radius: 4px; 
                    width: calc(({{ .Get "level" }} / 10) * 100%);">
        </div>
    </div>
</div>
